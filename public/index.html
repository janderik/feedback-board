<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #4f46e5; color: white; padding: 1.5rem 2rem; }
        .header h1 { font-size: 1.5rem; }
        .header p { opacity: 0.8; margin-top: 0.3rem; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .toolbar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .toolbar select, .toolbar button { padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; }
        .btn-primary { background: #4f46e5 !important; color: white; border: none !important; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; display: flex; gap: 1rem; }
        .vote-section { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; min-width: 50px; }
        .vote-btn { background: none; border: 1px solid #ddd; border-radius: 4px; width: 36px; height: 30px; cursor: pointer; font-size: 1rem; }
        .vote-btn:hover { background: #f0f0f0; }
        .vote-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .score { font-weight: bold; font-size: 1.1rem; }
        .content { flex: 1; }
        .content h3 { margin-bottom: 0.3rem; color: #111; }
        .content p { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .meta { display: flex; gap: 1rem; font-size: 0.8rem; color: #999; }
        .status { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
        .status-idea { background: #e0e7ff; color: #3730a3; }
        .status-planned { background: #fef3c7; color: #92400e; }
        .status-in-progress { background: #d1fae5; color: #065f46; }
        .status-done { background: #a7f3d0; color: #064e3b; }
        .status-declined { background: #fee2e2; color: #991b1b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 2rem; width: 90%; max-width: 500px; }
        .modal-content h2 { margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Feedback Board</h1>
        <p>Share ideas and vote on what matters most</p>
    </div>
    <div class="container">
        <div class="toolbar">
            <select id="filter-status" onchange="loadFeedback()">
                <option value="">All Statuses</option>
                <option value="idea">Ideas</option>
                <option value="planned">Planned</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
            </select>
            <select id="sort-by" onchange="loadFeedback()">
                <option value="newest">Newest</option>
                <option value="votes">Most Votes</option>
            </select>
            <button class="btn-primary" onclick="openModal()">+ New Feedback</button>
        </div>
        <div id="feedback-list"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>New Feedback</h2>
            <div class="form-group"><label>Title</label><input type="text" id="fb-title" placeholder="Brief description"></div>
            <div class="form-group"><label>Description</label><textarea id="fb-desc" rows="4" placeholder="Details..."></textarea></div>
            <div class="form-group"><label>Category</label><select id="fb-category"><option value="feature">Feature</option><option value="bug">Bug</option><option value="improvement">Improvement</option><option value="general">General</option></select></div>
            <div class="form-actions">
                <button onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="submitFeedback()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        async function loadFeedback() {
            const status = document.getElementById('filter-status').value;
            const sort = document.getElementById('sort-by').value;
            const params = new URLSearchParams();
            if (status) params.set('status', status);
            if (sort === 'votes') params.set('sort', 'votes');
            const res = await fetch(`/api/feedback?${params}`);
            const items = await res.json();
            document.getElementById('feedback-list').innerHTML = items.map(i => `
                <div class="card">
                    <div class="vote-section">
                        <button class="vote-btn" onclick="vote('${i.id}','up')">▲</button>
                        <span class="score">${i.score || 0}</span>
                        <button class="vote-btn" onclick="vote('${i.id}','down')">▼</button>
                    </div>
                    <div class="content">
                        <h3>${escape(i.title)}</h3>
                        <p>${escape(i.description)}</p>
                        <div class="meta">
                            <span class="status status-${i.status}">${i.status}</span>
                            <span>${i.category}</span>
                            <span>by ${escape(i.author)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function vote(id, dir) {
            await fetch(`/api/feedback/${id}/vote`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ direction: dir }) });
            loadFeedback();
        }

        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function submitFeedback() {
            const data = { title: document.getElementById('fb-title').value, description: document.getElementById('fb-desc').value, category: document.getElementById('fb-category').value };
            if (!data.title) return alert('Title required');
            await fetch('/api/feedback', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            closeModal();
            document.getElementById('fb-title').value = '';
            document.getElementById('fb-desc').value = '';
            loadFeedback();
        }

        function escape(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        loadFeedback();
    </script>
</body>
</html>
